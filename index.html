<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>Knowledge Atlas (public) — AI · World · Beauty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0B1A2E; --void-2:#0E2138; --pane:#0C1B30;
    --gold:#C9A85C; --gold-2:#E8C779; --gold-3:#8A763F; --gold-4:#4F4426;
    --cream:#FAF5E9; --cream-2:#F1EAD7; --txt:#EDE5CF; --dim:#CDC3A6; --faint:#A89D7E;
    --ai:#E3BC5E; --beauty:#E08568; --world:#7FAEE8; --career:#6FCDB4; --gaming:#B79BE8;
    --hit:#9FCB8E; --miss:#7A8489; --open:#D8CDB4;
  }
  :root{--ease-expo:cubic-bezier(0.16,1,0.3,1);}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{display:flex; background:var(--void); color:var(--txt); font-family:'Source Sans 3','Segoe UI',system-ui,sans-serif; font-size:15.5px; line-height:1.66; -webkit-font-smoothing:antialiased; overflow:hidden;}
  ::selection{background:rgba(201,168,92,.35); color:var(--cream);}
  a{color:var(--gold); text-decoration:none;}
  ::-webkit-scrollbar{width:7px;} ::-webkit-scrollbar-thumb{background:var(--gold-4); border-radius:4px;}

  /* ════ THE SPINE (left) — the engraved plumb line ════ */
  #spine{width:330px; flex-shrink:0; height:100vh; overflow-y:auto; position:relative;
    background:linear-gradient(180deg, rgba(11,26,46,.42), rgba(9,20,36,.66));
    border-right:1px solid var(--gold-4); padding:0 0 80px;}
  /* the continuous plumb line */
  #spine::before{display:none;}
  .sp-head{padding:30px 24px 6px 24px; text-align:center; position:relative; z-index:1;
    text-shadow:0 0 10px rgba(9,20,36,.95), 0 0 4px rgba(9,20,36,.95), 0 1px 2px rgba(9,20,36,.9);}
  .sp-head .pre{font-family:'Cinzel',serif; font-size:9px; letter-spacing:.4em; text-transform:uppercase; color:var(--cream-2);}
  .sp-head h1{font-family:'Cinzel',serif; font-weight:600; font-size:21px; letter-spacing:.2em; color:var(--gold-2); margin-top:8px;}
  .sp-head .ed{font-family:'Cinzel',serif; font-size:8.5px; letter-spacing:.24em; text-transform:uppercase; color:var(--dim); margin-top:6px;}
  .bigclock{position:absolute; left:50%; top:-92px; margin-left:-200px; z-index:0; opacity:.62; pointer-events:none;
    filter:brightness(1.3) drop-shadow(0 0 3px rgba(232,199,121,.4));}
  .bigclock svg line, .bigclock svg circle, .bigclock svg path{opacity:.9;}
  .sptend{position:absolute; left:0; top:0; width:100%; height:1560px; pointer-events:none; z-index:0;
    filter:drop-shadow(0 0 2.5px rgba(232,199,121,.4));}
  .sptend path{fill:none; stroke:var(--gold); stroke-width:1.1; opacity:.5; stroke-linecap:round;}
  .sptend .wsp{stroke-width:.8; opacity:.42;}
  
  
  
  .orbits{position:absolute; left:0; top:96px; width:100%; height:1560px; pointer-events:none; z-index:0;}
  .orbits circle{fill:none; stroke:var(--gold); stroke-width:1; opacity:.4; stroke-dasharray:2 6;}
  .orbits text{font-family:'Cinzel',serif; font-size:10px; fill:var(--gold-2); opacity:.72;}
  .node .glyph{position:relative;}
  .node.sel .glyph::after{content:''; position:absolute; left:50%; top:50%; width:46px; height:46px; margin:-23px 0 0 -23px; border:1px dashed var(--gold-2); border-radius:50%; opacity:.85; animation:spin 26s linear infinite;}
  .node.sel .glyph::before{content:''; position:absolute; left:50%; top:50%; width:56px; height:56px; margin:-28px 0 0 -28px; border:1px dotted var(--gold); border-radius:50%; opacity:.6; animation:spinr 40s linear infinite;}

  .node{display:flex; align-items:center; gap:11px; padding:8px 12px 8px 24px; cursor:pointer; position:relative; transition:background .15s;}
  .node:hover{background:rgba(201,168,92,.05);}
  .node.sel{background:rgba(201,168,92,.09);}
  .node.sel::after{content:''; position:absolute; right:0; top:12%; bottom:12%; width:2px; background:var(--gold);}
  .node .glyph{width:58px; flex-shrink:0; display:flex; justify-content:center; position:relative; z-index:1;}
  .node .tx{min-width:0;}
  .node .nm{font-family:'Cinzel',serif; letter-spacing:.1em; color:var(--cream-2); line-height:1.25;}
  .node .sub{font-family:'Cinzel',serif; font-size:8.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); margin-top:2px;}
  .node.lv0 .nm{font-size:13.5px; color:var(--gold-2); text-transform:uppercase; letter-spacing:.18em;}
  .node.lv1 .nm{font-size:12.5px; text-transform:uppercase; letter-spacing:.16em;}
  .node.lv2{padding-left:40px;} .node.lv2 .glyph{width:42px;}
  .node.lv2 .nm{font-family:'Source Sans 3',sans-serif; font-size:13px; letter-spacing:.01em;}
  .node.lv2 .nm .st{font-family:'Cinzel',serif; font-size:8px; letter-spacing:.12em; margin-left:6px;}
  .st.hit{color:var(--hit);} .st.miss{color:var(--miss);} .st.open{color:var(--gold);}
  /* ── motion: the spine is alive ── */
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes spinr{to{transform:rotate(-360deg);}}
  .rot{animation:spin 80s linear infinite; transform-origin:center; transform-box:fill-box;}
  .rotr{animation:spinr 110s linear infinite; transform-origin:center; transform-box:fill-box;}
  @keyframes tw4{0%,100%{opacity:.5;}50%{opacity:1;}}
  .tw4{animation:tw4 3.6s ease-in-out infinite;}
  @keyframes drip{0%{top:118px; opacity:0;}6%{opacity:.95;}90%{opacity:.95;}100%{top:96%; opacity:0;}}
  .pl-dot{display:none; position:absolute; left:54px; width:5px; height:5px; border-radius:50%; background:var(--gold-2); box-shadow:0 0 10px var(--gold-2); animation:drip 13s linear infinite; z-index:0; pointer-events:none;}
  .pl-dot.d2{animation-delay:6.5s; width:3.5px; height:3.5px;}
  .weave{position:absolute; left:0; top:104px; width:120px; height:1560px; pointer-events:none; opacity:.42; z-index:0;}
  .weave path{fill:none; stroke:var(--gold-3); stroke-width:0.8;}
  .weave .flow{stroke:var(--gold-2); stroke-width:0.6; stroke-dasharray:2 10; animation:dashf 36s linear infinite; opacity:.7;}
  .weave .wisp{stroke:var(--gold-3); stroke-width:0.6; opacity:.45; stroke-linecap:round;}
  @keyframes starsDrift{from{background-position:0 0, 0 0, 0 0, 0 0;}to{background-position:0 0, 0 640px, 0 -420px, 0 520px;}}
  .node .glyph svg{transition:transform .25s ease;}
  .node:hover .glyph svg{transform:scale(1.1);}
  @media (prefers-reduced-motion:reduce){.rot,.rotr,.tw4,.pl-dot,.sfar,.snear,.shoot,.node.sel .glyph::after,.node.sel .glyph::before{animation:none;} .rv{opacity:1; transform:none; filter:none;} .scard.on .xp,.scard.on .xp > *,.cband,.cband > *{animation:none;}}
  .kids{overflow:hidden; max-height:0; transition:max-height .65s var(--ease-expo);}
  .kids.open{max-height:1200px;}
  /* hanging chain for children */
  .kids{position:relative;}
  .kids::before{display:none;}
  .sect{font-family:'Cinzel',serif; font-size:8px; letter-spacing:.24em; text-transform:uppercase; color:var(--dim); padding:8px 12px 2px 80px;}
  .fchips{display:flex; flex-wrap:wrap; gap:6px; justify-content:center; padding:12px 14px 6px; position:relative; z-index:1;}
  .fchip{display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border:1px solid var(--gold-4); border-radius:14px; font-family:'Cinzel',serif; font-size:8.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--cream-2); cursor:pointer; transition:opacity .15s;}
  .fchip i{width:7px; height:7px; border-radius:50%; display:inline-block;}
  .fchip.off{opacity:.35; text-decoration:line-through;}

  /* ════ THE PANE (right) — the reading surface ════ */
  #pane{flex:1; height:100vh; overflow-y:auto; background:rgba(11,26,46,.55); padding:0 0 90px;}
  #spine,#pane,#rail{position:relative; z-index:1;}
  #cosmos{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; background:var(--void);}
  /* the universe clock — gearworks anchored left, behind the nav */
  #cosmos .clock{position:absolute; left:-265px; top:50%; width:1000px; height:1000px; transform:translateY(-50%); opacity:.52;}
  #cosmos .c-ring{stroke:var(--gold-4); fill:none; stroke-width:.7; opacity:.5;}
  #cosmos .c-faint{stroke:var(--gold-3); fill:none; opacity:.55;}
  #cosmos .c-dot{fill:var(--gold-2);}
  /* tendrils — emanating from the clock, flowing right, joining the model rail */
  #cosmos .tend{position:absolute; inset:0; width:100%; height:100%;}
  #cosmos .tend path{fill:none; stroke:var(--gold-3); opacity:.38;}
  @keyframes dashf{to{stroke-dashoffset:-360;}}
  .tflow{stroke-dasharray:3 9; animation:dashf 30s linear infinite; opacity:.5;}
  .slayer{position:absolute; inset:-20%; width:140%; height:140%;}
  @keyframes sdrift{from{transform:translateY(0);}to{transform:translateY(-44px);}}
  .sfar{animation:sdrift 220s linear infinite;} .snear{animation:sdrift 130s linear infinite reverse;}
  .shoot{position:absolute; top:18%; left:-6%; width:120px; height:1px; background:linear-gradient(90deg,transparent,var(--gold-2)); opacity:0; animation:shootA 16s ease-in infinite;}
  .shoot.s2{top:62%; left:30%; animation-delay:8s; animation-duration:20s;}
  @keyframes shootA{0%{opacity:0; transform:translate(0,0) rotate(16deg);}4%{opacity:.85;}13%{opacity:0; transform:translate(560px,170px) rotate(16deg);}100%{opacity:0; transform:translate(560px,170px) rotate(16deg);}}
  /* ── the model rail (right): trends, numbers, minds — never lost ── */
  #rail{width:292px; flex-shrink:0; height:100vh; overflow-y:auto; border-left:1px solid var(--gold-4);
    background:linear-gradient(180deg, rgba(11,26,46,.58), rgba(9,20,36,.8)); padding:20px 16px 70px;}
  .r-h{font-family:'Cinzel',serif; font-size:9px; letter-spacing:.24em; text-transform:uppercase; color:var(--gold); margin:18px 0 8px; display:flex; align-items:center; gap:8px;}
  .r-h::after{content:''; flex:1; height:1px; background:linear-gradient(90deg, var(--gold-4), transparent);}
  .r-h:first-child{margin-top:2px;}
  .r-trend{display:flex; align-items:baseline; gap:8px; padding:6px 2px; border-bottom:1px solid rgba(138,118,63,.16); font-size:12.5px; color:var(--cream-2); line-height:1.4;}
  .r-trend .m{font-family:'Cinzel',serif; width:14px; flex-shrink:0; text-align:center;}
  .r-trend .m.up{color:var(--hit);} .r-trend .m.down{color:#D98A8A;} .r-trend .m.flat{color:var(--dim);}
  .r-trend span{flex:1;}
  .r-trend b{font-family:'Cinzel',serif; font-size:10.5px; color:var(--gold-2); font-weight:500; white-space:nowrap;}
  .r-fc{margin:7px 0;}
  .r-fc .t{font-size:12px; color:var(--cream-2); margin-bottom:4px; line-height:1.35;}
  .r-fc .bar{height:5px; background:rgba(255,255,255,.07); border-radius:3px; position:relative;}
  .r-fc .bar i{position:absolute; left:0; top:0; bottom:0; border-radius:3px; background:var(--gold);}
  .r-fc .bar em{position:absolute; top:-3px; width:1.5px; height:11px; background:var(--cream); opacity:.65;}
  .r-fc .v{font-family:'Cinzel',serif; font-size:9px; color:var(--dim); margin-top:3px; letter-spacing:.08em;}
  .r-mind{display:flex; align-items:center; gap:8px; padding:5px 2px; font-size:12px; color:var(--cream-2); border-bottom:1px solid rgba(138,118,63,.14);}
  .r-mind i{width:7px; height:7px; border-radius:50%; flex-shrink:0;}
  .r-mind span{flex:1;}
  .r-mind b{font-family:'Cinzel',serif; font-size:10.5px; color:var(--gold-2); font-weight:500;}
  .r-axis{position:relative; height:46px; margin:6px 2px 2px;}
  .r-axis .ln{position:absolute; left:0; right:0; top:24px; height:1px; background:var(--gold-4);}
  .r-axis .tick{position:absolute; top:20px; width:1px; height:9px; background:var(--gold-4);}
  .r-axis .dot{position:absolute; top:24px; width:9px; height:9px; border-radius:50%; transform:translate(-50%,-50%); border:1px solid var(--void);}
  .r-axis .lab{position:absolute; top:32px; font-family:'Cinzel',serif; font-size:7.5px; letter-spacing:.06em; color:var(--dim); transform:translateX(-50%);}
  .r-note{font-size:11.5px; font-style:italic; color:var(--dim); line-height:1.5; margin-top:6px;}
  .r-follow{font-family:'Spectral',serif; font-size:11.5px; font-style:italic; color:var(--dim); margin:-2px 0 6px;}
  .r-follow b{color:var(--gold-2); font-style:normal; font-weight:500;}
  .r-fc.on{border-left:2px solid var(--gold); padding-left:8px; margin-left:-10px;}
  .fresh{font-style:normal; font-family:'Cinzel',serif; font-size:8px; letter-spacing:.1em; color:var(--hit);}
  /* atomized story cards — the landscape grammar */
  .scard{border:1px solid var(--gold-3); border-radius:5px; background:rgba(14,33,56,.66); padding:18px 22px 15px; margin-bottom:14px; position:relative; cursor:pointer; transition:border-color .15s;}
  .scard::after{content:''; position:absolute; inset:4px; border:1px solid rgba(201,168,92,.18); border-radius:3px; pointer-events:none;}
  .scard:hover{border-color:var(--gold);}
  .scard.on{border-color:var(--gold); box-shadow:0 0 26px rgba(201,168,92,.18);}
  .scard .eye{font-family:'Cinzel',serif; font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--dim); display:flex; justify-content:space-between; gap:8px; margin-bottom:7px;}
  .scard .eye b{color:var(--gold); font-weight:500;}
  .scard h3{font-family:'Cormorant Garamond',serif; font-weight:600; font-size:21px; line-height:1.2; color:var(--cream); margin-bottom:7px;}
  .scard .bd{font-size:14.5px; line-height:1.62; color:var(--txt);}
  .scard .bd b{color:var(--cream);}
  .scard .ft{display:flex; flex-wrap:wrap; gap:7px; margin-top:10px; align-items:center;}
  .scard .ft .cx{font-family:'Cinzel',serif; font-size:8.5px; letter-spacing:.12em; text-transform:uppercase; padding:3px 10px; border:1px solid var(--gold-4); border-radius:12px; color:var(--cream-2); cursor:pointer;}
  .scard .ft .cx:hover{border-color:var(--gold); color:var(--gold-2);}
  .scard .ft .odds{margin-left:auto; font-family:'Cinzel',serif; font-size:8.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--hit);}
  .scard .more{margin-left:auto; font-family:'Cinzel',serif; font-size:8.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold);}
  .xp{display:none; margin-top:12px; border-top:1px solid rgba(201,168,92,.22); padding-top:4px;}
  .scard.on .xp{display:block; animation:xpIn .7s var(--ease-expo);}
  .scard.on .xp > *{animation:xpIn .7s var(--ease-expo) backwards;}
  .scard.on .xp > *:nth-child(2){animation-delay:.08s;} .scard.on .xp > *:nth-child(3){animation-delay:.16s;}
  .scard.on .xp > *:nth-child(4){animation-delay:.24s;} .scard.on .xp > *:nth-child(n+5){animation-delay:.3s;}
  .xp .xl{font-family:'Cinzel',serif; font-size:9px; letter-spacing:.22em; text-transform:uppercase; color:var(--gold); margin:13px 0 6px; display:flex; align-items:center; gap:9px;}
  .xp .xl::after{content:''; flex:1; height:1px; background:linear-gradient(90deg, var(--gold-4), transparent);}
  .xp p{font-size:14px; line-height:1.62; margin-bottom:8px;}
  .xp .qt{border-left:1px solid var(--gold-3); padding:4px 0 4px 13px; margin:7px 0; font-size:13.5px; line-height:1.55; font-family:'Spectral',Georgia,serif;}
  .xp .qt b{color:var(--cream);} .xp .qt i{color:var(--dim); font-style:italic; font-size:12px;}
  .xp .flag{display:inline-block; font-family:'Cinzel',serif; font-size:8.5px; letter-spacing:.1em; padding:2px 9px; border:1px solid rgba(217,138,138,.5); border-radius:11px; color:#D98A8A; margin:2px 6px 2px 0;}
  .xp .okc{display:inline-block; font-family:'Cinzel',serif; font-size:8.5px; letter-spacing:.1em; padding:2px 9px; border:1px solid rgba(159,203,142,.5); border-radius:11px; color:var(--hit); margin:2px 6px 2px 0;}
  .srcs a{display:inline-block; margin:2px 14px 2px 0; font-size:12.5px; color:var(--gold-2); text-decoration:none; border-bottom:1px dotted var(--gold-3); padding-bottom:1px;}
  .srcs a:hover{color:var(--cream); border-bottom-color:var(--gold-2);}
  .bchart .br{display:flex; align-items:center; gap:9px; margin:5px 0;}
  .bchart .br span{width:130px; font-family:'Cinzel',serif; font-size:9px; letter-spacing:.06em; color:var(--cream-2); text-align:right;}
  .bchart .br .tr{flex:1; height:7px; background:rgba(255,255,255,.07); border-radius:3px; position:relative;}
  .bchart .br .tr i{position:absolute; left:0; top:0; bottom:0; border-radius:3px;}
  .bchart .br b{font-family:'Cinzel',serif; font-size:9.5px; color:var(--gold-2); width:38px;}
  /* the drawn thread: selected node → content → rail */
  #thread{position:fixed; inset:0; z-index:2; pointer-events:none;}
  #thread path{fill:none; stroke:var(--gold-2); stroke-width:1.1; opacity:.5; stroke-dasharray:3 7; animation:dashf 22s linear infinite;}
  #thread circle{fill:var(--gold-2);}
  /* connection diagram (rail, for cards with no forecast) */
  .r-diag{margin:6px 0 2px;}
  /* expanded-card band: numbers left · card center · quotes right */
  .cband{display:grid; grid-template-columns:200px minmax(0,1fr) 280px; gap:16px; align-items:start; margin-bottom:14px; animation:xpIn .75s var(--ease-expo);}
  .cband > *{animation:xpIn .85s var(--ease-expo) backwards;}
  .cband > *:nth-child(1){animation-delay:.12s;} .cband > *:nth-child(3){animation-delay:.2s;}
  @keyframes xpIn{from{opacity:0; transform:translateY(-6px) scale(.985); filter:blur(9px);}to{opacity:1; transform:none; filter:none;}}
  .rv{opacity:0; transform:translateY(12px) scale(.995); filter:blur(8px); transition:opacity .9s var(--ease-expo), transform .9s var(--ease-expo), filter .9s var(--ease-expo);}
  .rv.in{opacity:1; transform:none; filter:none;}
  .r-fc .bar i{transition:width .9s var(--ease-expo);}
  @keyframes nodeIn{from{opacity:0; transform:translateX(-14px); filter:blur(4px);}to{opacity:1; transform:none; filter:none;}}
  .r-so{font-size:13px; line-height:1.6; color:var(--cream-2); border-left:2px solid var(--gold); padding:5px 0 5px 12px; margin:2px 0 10px;}
  .cb-r .qt{cursor:pointer; transition:border-color .15s;}
  .cb-r .qt:hover{border-color:var(--gold-2);}
  .cb-r .fa{font-family:'Cinzel',serif; font-size:8px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); display:block; margin-top:4px;}
  .backbig{display:inline-block; position:sticky; top:56px; z-index:4; padding:13px 24px 12px; border:1.5px solid var(--gold); border-radius:6px;
    background:rgba(10,22,40,.94); font-family:'Cinzel',serif; font-size:11.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--gold-2);
    cursor:pointer; margin-bottom:20px; box-shadow:0 8px 26px rgba(0,0,0,.45); transition:background .15s;}
  .backbig:hover{background:rgba(201,168,92,.14);}
  .backbig span{display:block; font-family:'Source Sans 3',sans-serif; font-size:11px; letter-spacing:.04em; text-transform:none; color:var(--dim); margin-top:4px;}
  .cband .cb-m .scard{margin-bottom:0;}
  .cb-l .callout{border:1px solid var(--gold-3); border-radius:4px; background:rgba(14,33,56,.66); padding:13px 13px 11px; text-align:center; margin-bottom:11px;}
  .cb-l .cl-lab{font-family:'Cinzel',serif; font-size:8.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--gold); margin-bottom:6px;}
  .cb-l .big{font-family:'Cormorant Garamond',serif; font-weight:600; font-size:27px; line-height:1.04; color:var(--gold-2);}
  .cb-l .sm{font-style:italic; font-size:12px; color:var(--cream-2); margin-top:4px; line-height:1.4;}
  .cb-r{border-left:1px solid var(--gold-4); padding-left:15px;}
  .cb-r .rh{font-family:'Cinzel',serif; font-size:9px; letter-spacing:.22em; text-transform:uppercase; color:var(--gold); margin-bottom:8px;}
  .cb-r .qt{border-left:1px solid var(--gold-3); padding:4px 0 4px 11px; margin:0 0 11px; font-size:13px; line-height:1.55; font-family:'Spectral',Georgia,serif;}
  .cb-r .qt b{color:var(--cream);} .cb-r .qt i{color:var(--cream-2); font-style:italic;}
  @media(max-width:1560px){ .cband{grid-template-columns:1fr;} .cb-r{border-left:none; padding-left:0;} .cb-l{display:flex; flex-wrap:wrap; gap:11px;} .cb-l .callout{flex:1; min-width:140px;} }
  @keyframes railIn{from{opacity:0; transform:translateX(14px); filter:blur(6px);}to{opacity:1; transform:none; filter:none;}}
  /* ── dropdown field filter ── */

function orrery(px=112){
  let g='';
  // instrument face: tick ring + dashed zodiac ring
  for(let i=0;i<48;i++){ const a=i/48*Math.PI*2, r0=i%4?54.5:52.6;
    g+=`<line x1="${(60+Math.cos(a)*r0).toFixed(1)}" y1="${(60+Math.sin(a)*r0).toFixed(1)}" x2="${(60+Math.cos(a)*56.5).toFixed(1)}" y2="${(60+Math.sin(a)*56.5).toFixed(1)}" stroke="var(--gold)" stroke-width="${i%4?0.5:0.9}" opacity="${i%4?0.5:0.8}"/>`; }
  g+=`<circle cx="60" cy="60" r="50" fill="none" stroke="var(--gold)" stroke-width="0.6" stroke-dasharray="1 5" opacity="0.6"/>`;
  [40,29,18].forEach(r=>{ g+=`<circle cx="60" cy="60" r="${r}" fill="none" stroke="var(--gold)" stroke-width="0.45" opacity="0.45"/>`; });
  // the sun at center
  for(let i=0;i<12;i++){ const a=i/12*Math.PI*2, L=i%2?9:11.5;
    g+=`<line x1="${(60+Math.cos(a)*7).toFixed(1)}" y1="${(60+Math.sin(a)*7).toFixed(1)}" x2="${(60+Math.cos(a)*L).toFixed(1)}" y2="${(60+Math.sin(a)*L).toFixed(1)}" stroke="var(--gold-2)" stroke-width="0.6"/>`; }
  g+=`<circle cx="60" cy="60" r="5" fill="none" stroke="var(--gold-2)" stroke-width="0.9"/><circle cx="60" cy="60" r="2.2" fill="var(--gold-2)" class="tw4" style="animation-duration:6s"/>`;
  // wanderers — smooth slow orbits (SMIL rotate about the face center)
  const orb=(dur,rev,inner)=>`<g>${inner}<animateTransform attributeName="transform" type="rotate" from="${rev?360:0} 60 60" to="${rev?0:360} 60 60" dur="${dur}" repeatCount="indefinite"/></g>`;
  g+=orb('64s',0,`<circle cx="60" cy="20" r="2.6" fill="var(--gold-2)"/><circle cx="60" cy="20" r="4.6" fill="none" stroke="var(--gold)" stroke-width="0.4" stroke-dasharray="0.8 1.6" opacity="0.7"/>`);
  g+=orb('96s',1,`<path d="M61.4 28.4 A3 3 0 1 0 61.4 33.6 A2.3 2.3 0 1 1 61.4 28.4" fill="var(--gold-2)" opacity="0.85"/>`);
  g+=orb('44s',0,`<circle cx="60" cy="42" r="1.8" fill="var(--gold)"/>`);
  g+=orb('150s',1,`<path d="M60 7.6 L60.9 9.4 L62.7 10.3 L60.9 11.2 L60 13 L59.1 11.2 L57.3 10.3 L59.1 9.4 Z" fill="var(--gold-2)" opacity="0.9"/>`);
  return `<svg width="${px}" height="${px}" viewBox="0 0 120 120">${g}</svg>`;
}

  let t='';

  return `<svg width="${r*2}" height="${r*2}" viewBox="0 0 ${r*2} ${r*2}">

function toggleField(id){ hidden.has(id)?hidden.delete(id):hidden.add(id); localStorage.setItem('wmHidden', JSON.stringify([...hidden])); if(sel===id||sel.startsWith(id+'.')) sel='sun'; buildSpine(); render(); }
function getC(v){ return ({'var(--ai)':'#E3BC5E','var(--beauty)':'#E08568','var(--world)':'#7FAEE8','var(--career)':'#6FCDB4','var(--gaming)':'#B79BE8'})[v]||'#C9A85C'; }

// ═══════════════════ RENDER: PANE ═══════════════════
const crumbEl = document.getElementById('crumb'), contentEl = document.getElementById('content');
function fld(id){ return WM.fields.find(f=>f.id===id); }
let railField='ai'; let readingDoc=null;
function go(id){ sel=id; readingDoc=null; focusCard=null; const fid=id.split('.')[0]; if(fld(fid)) railField=fid; buildSpine(); render(); renderRail(); document.getElementById('pane').scrollTop=0; }
const MINDS_REAL=[['Dario Amodei','#C9788F','.090 · 1/1'],['Andrew (you)','#D8B36A','.250* practice'],['Baseline','#74B98A','.360'],['Benedict Evans','#5FB3A6','.384'],['Nate B. Jones','#6E97C9','.410'],['NLW','#D2725E','unscored']];
function railAxis(minds){ // minds: [name, p]
  let dots=''; const cols={'Amodei':'#C9788F','You*':'#D8B36A','You':'#D8B36A','Baseline':'#74B98A','Evans':'#5FB3A6','Jones':'#6E97C9','Panel':'#C9A85C'};
  minds.forEach(m=>{ const num=parseFloat((m[1]||'').match(/[\d.]+/)||[NaN]); if(isNaN(num)||num>1) return;
    const x=(num*100).toFixed(1); const c=cols[m[0]]||'#C9A85C';
    dots+=`<span class="dot" style="left:${x}%; background:${c};" title="${m[0]} ${num}"></span><span class="lab" style="left:${x}%;">${m[0].replace('*','')}</span>`; });
  return `<div class="r-axis"><div class="ln"></div><span class="tick" style="left:0%"></span><span class="tick" style="left:50%"></span><span class="tick" style="left:100%"></span>${dots}</div>`;
}
function selName(){
  if(readingDoc) return 'reading: '+readingDoc;
  if(sel==='sun') return 'the overview'; if(sel==='today') return 'what changed today'; if(sel==='reck') return 'the scoreboard'; if(sel.startsWith('day:')) return 'today · '+(WM.sun.today[+sel.slice(4)]||{}).d; if(sel.startsWith('take:')) return 'expert analysis';
  const [fid,leaf]=sel.split('.'); const f=fld(fid); if(!f) return '';
  if(!leaf) return f.name;
  if(leaf[0]==='t') return (f.theses[+leaf.slice(1)]||{}).t||f.name;
  if(leaf[0]==='f') return (f.forecasts[+leaf.slice(1)]||{}).t||f.name;
  return f.name; }
function renderRail(){
  const f = fld(railField) || WM.fields[0];
  const c = getC(f.c);
  let h = `<div class="r-h">the model · ${f.id==='ai'?'AI':f.name.split(' ')[0]}</div>`;
  h += `<div class="r-follow">following → <b>${selName()}</b></div>`;
  if(!focusCard && f.trends && f.trends.length){
    h += f.trends.map(t=>`<div class="r-trend"><span class="m ${t.m}">${t.m==='up'?'▲':t.m==='down'?'▼':'→'}</span><span>${t.t}</span>${t.n?`<b>${t.n}</b>`:''}</div>`).join('');
  } else { h += `<div class="r-note">consumptive field — taste, not theses.</div>`; }
  if(!focusCard && f.forecasts && f.forecasts.length){
    h += `<div class="r-h">forecasts · live odds</div>`;
    f.forecasts.forEach((fc,i)=>{ const pm=(fc.d.match(/[Pp]anel (0\.\d+)/)||[])[1]; const base=(fc.d.match(/[Bb]ase(?:line)? (0\.\d+)/)||[])[1];
      const p = fc.st==='hit'?1:(pm?parseFloat(pm):(base?parseFloat(base):null));
      const on = sel===`${f.id}.f${i}`;
      h += `<div class="r-fc${on?' on':''}" style="cursor:pointer" onclick="go('${f.id}.f${i}')"><div class="t">${fc.t.split('—')[0].split(':')[0]}</div>`;
      if(p!=null) h += `<div class="bar"><i data-w="${(p*100).toFixed(0)}%" style="width:0; background:${fc.st==='hit'?'#9FCB8E':c}"></i>${base?`<em style="left:${parseFloat(base)*100}%"></em>`:''}</div><div class="v">${fc.st==='hit'?'resolved hit':(pm?'panel '+pm:'base '+base)}${base&&pm?' · base '+base:''}</div>`;
      else h += `<div class="v">${fc.st}</div>`;
      h += `</div>`; });
  }
  // selected forecast → the minds on an axis
  let axFc=null;
  if(sel.includes('.f')) axFc=f.forecasts[+sel.split('.f')[1]];
  if(focusCard){ const cd=(WM.sun.today[focusCard.di]||{cards:[]}).cards[focusCard.ci];
    if(cd){ if(cd.fc){ const tf=fld(cd.fc.split('.')[0]); axFc=tf.forecasts[+cd.fc.split('.f')[1]]||axFc; }
      h += `<div class="r-h">so what</div>`;
      h += `<div class="r-so">${(cd.deep&&cd.deep.so)||(cd.fc?'Feeds the forecast below as one data point — no number moves on this alone.':'Context only — no prediction moves on this alone.')}</div>`;
      const n=(cd.connects||[]).length;
      let dg='<svg width="100%" viewBox="0 0 260 160" class="r-diag">';
      dg+=`<circle cx="130" cy="80" r="6" fill="var(--gold-2)"/><circle cx="130" cy="80" r="12" fill="none" stroke="var(--gold-3)" stroke-width="0.6" stroke-dasharray="1 3"/>`;
      (cd.connects||[]).forEach((cn,i)=>{ const a=(i/Math.max(n,1))*Math.PI*2 - Math.PI/2; const x=130+Math.cos(a)*94, y=80+Math.sin(a)*56;
        dg+=`<path d="M130 80 Q ${(130+x)/2+(y-80)*0.35} ${(80+y)/2-(x-130)*0.35} ${x} ${y}" fill="none" stroke="var(--gold-3)" stroke-width="0.9" stroke-dasharray="2 4"/><circle cx="${x}" cy="${y}" r="3.8" fill="none" stroke="var(--gold-2)" stroke-width="1"/><text x="${x}" y="${y+16}" font-size="7.5" fill="var(--dim)" text-anchor="middle" font-family="Cinzel">${cn[0].split(':')[0]}</text>`; });
      dg+='</svg>'; h+=dg;
      h += (cd.connects||[]).map(cn=>`<div class="r-mind" style="cursor:pointer" onclick="go('${cn[1]}')"><i style="background:var(--gold-2)"></i><span>${cn[0]}</span><b>›</b></div>`).join('');
    } }
  if(axFc && axFc.minds && axFc.minds.length){ h += `<div class="r-h">the minds · this question</div>` + railAxis(axFc.minds); }
  if(!focusCard) h += `<div class="r-h">the minds · accuracy</div>` + MINDS_REAL.map(m=>`<div class="r-mind"><i style="background:${m[1]}"></i><span>${m[0]}</span><b>${m[2]}</b></div>`).join('');
  if(!focusCard) h += `<div class="r-note" style="display:flex; gap:8px; align-items:flex-start;">${window.WMICONS?WMICONS.handCommit('#C9A85C',26):''}<span>Brier — lower is sharper. Weights move after 5 resolved per lane. Your entry-2026 slot is open: 0.35 offered.</span></div>`;
  const rail=document.getElementById('rail');
  rail.innerHTML = h;
  rail.style.animation='none'; void rail.offsetWidth; rail.style.animation='railIn .8s var(--ease-expo)';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ rail.querySelectorAll('.bar i[data-w]').forEach(b=>{ b.style.width=b.dataset.w; }); }));
}
function pageLink(label,key){ return `<span class="openfull" style="cursor:pointer;" onclick="goPage('${key}')">❖ ${label}</span>`; }
let focusCard=null; let takeOrigin=null;
function openTake(k,di,ci){ takeOrigin={sel:sel, di:di, ci:ci, scroll:document.getElementById('pane').scrollTop}; go('take:'+k); }
function backToCard(){ if(!takeOrigin){ go('today'); return; }
  sel=takeOrigin.sel; focusCard={di:takeOrigin.di, ci:takeOrigin.ci};
  buildSpine(); render(); renderRail();
  document.getElementById('pane').scrollTop=takeOrigin.scroll;
  if(typeof drawThread==='function') requestAnimationFrame(drawThread); }
function focusOn(di,ci){ const keep=document.getElementById('pane').scrollTop; if(focusCard&&focusCard.di===di&&focusCard.ci===ci){ focusCard=null; render(); renderRail(); document.getElementById('pane').scrollTop=keep; return; } focusCard={di,ci}; const cd=WM.sun.today[di].cards[ci]; if(cd.fc){ const fid=cd.fc.split('.')[0]; if(fld(fid)) railField=fid; } render(); renderRail(); document.getElementById('pane').scrollTop=keep; }
function todaySections(){
  return WM.sun.today.filter(tv=>!isHiddenLabel(tv.d)).map(t=>{ const di=WM.sun.today.indexOf(t);
    const fid={AI:'ai',World:'world',Beauty:'beauty',Gaming:'gaming',Model:'career'}[t.d];
    const col=fid? getC((fld(fid)||{}).c||''):'var(--gold)';
    return `<div class="lbl" style="margin-top:26px; color:${t.d==='Model'?'var(--gold)':col};">${t.d} — <span style="letter-spacing:.1em;">updated ${t.fresh}</span></div>` +
      (t.cards||[]).map((cd,ci)=>cardHTML(di,ci,cd)).join('') +
      `<div style="margin:2px 0 6px;"><span class="cx" style="font-family:Cinzel,serif; font-size:8.5px; letter-spacing:.12em; text-transform:uppercase; padding:3px 10px; border:1px solid var(--gold-4); border-radius:12px; color:var(--dim); cursor:pointer;" onclick="goPage('${t.page}')">❖ the full ${t.d.toLowerCase()} brief</span></div>`;
  }).join(''); }
function cardHTML(di,ci,cd){ const on=focusCard&&focusCard.di===di&&focusCard.ci===ci;
  const xp = cd.deep? `<div class="xp">
    <div class="xl">the facts</div><p>${cd.deep.facts}</p>
    ${cd.deep.chart? `<div class="xl">${cd.deep.chart.t}</div><div class="bchart">`+cd.deep.chart.rows.map(r=>`<div class="br"><span>${r[0]}</span><div class="tr"><i style="width:${r[1]}%; background:${r[2]}"></i></div><b>${r[1]}</b></div>`).join('')+`</div>`:''}
    <div class="xl">the checks</div><p>${cd.deep.check}</p>
    <div class="xl">extrapolation · for the build</div><p>${cd.deep.extrap}</p>
    ${cd.deep.srcs? '<div class="xl">sources</div><p class="srcs">'+cd.deep.srcs.map(s=>'<a href="'+s[1]+'" target="_blank" onclick="event.stopPropagation()">'+s[0]+' ↗</a>').join('')+'</p>':''}</div>`
   : (on? `<div class="xp" style="display:block"><p style="font-style:italic; color:var(--dim);">compact card — the full workup (facts · takes · checks · extrapolation) is queued for the next content pass.</p></div>`:'');
  const core = `<div class="scard ${on?'on':''}" onclick="focusOn(${di},${ci})">
   <div class="eye"><span><b>${cd.src}</b> · ${cd.date}</span>${cd.fresh?'<i class="fresh">● new</i>':'<span style="opacity:.6">carried</span>'}</div>
   <h3>${cd.h}</h3><div class="bd">${cd.bd}</div>${xp}
   <div class="ft">${(cd.connects||[]).map(cn=>`<span class="cx" onclick="event.stopPropagation(); go('${cn[1]}')">${cn[0]} ›</span>`).join('')}<span class="more">${on?'▴ collapse':'▾ expand'}</span></div>
  </div>`;
  if(on && cd.deep){
    const L = (cd.deep.nums||[]).map(n=>`<div class="callout"><div class="cl-lab">${n[0]}</div><div class="big">${n[1]}</div><div class="sm">${n[2]}</div></div>`).join('');
    const R = cd.deep.takes? `<div class="rh">what’s being said · click for full analysis</div>` + cd.deep.takes.map(k=>{const T=TAKES[k]; return `<div class="qt" onclick="event.stopPropagation(); openTake('${k}',${di},${ci})"><b>${T.who.split(' · ')[0]}</b><br><i>${T.quotes[0].length>180? T.quotes[0].slice(0,178)+'…”':T.quotes[0]}</i><span class="fa">full analysis ›</span></div>`;}).join('')
      : (cd.deep.saying? `<div class="rh">what’s being said</div>${cd.deep.saying}`:'');
    return `<div class="cband"><aside class="cb-l">${L}</aside><div class="cb-m">${core}</div><aside class="cb-r">${R}</aside></div>`;
  }
  return core; }

  let crumb='', h='';
  if(sel==='sun'){ crumb='Atlas › <b>Overview</b>';
    h = `<h2>Overview</h2><div class="ep">where everything stands · ${TODAY}</div><div class="breath">${WM.sun.breath}</div>
    <div class="lbl">changed in the last day</div>` +
    todaySections() +
    `<div class="lbl">go deeper</div><p>Pick a field on the left — each opens its <span class="xlink" onclick="go('ai')">summary</span>, the working beliefs (each with the evidence that would change it), the scored forecasts, and the briefs behind them. At the bottom: the <span class="xlink" onclick="go('reck')">forecast scoreboard</span>.</p>
    ${pageLink('State of the Fields — the full page','fields')}`; }
  else if(sel==='today'){ crumb='Atlas › <b>What changed today</b>';
    h = `<h2>What Changed Today</h2><div class="ep">${TODAY} · every story, grouped by field · cards expand in place</div>` + todaySections(); }
  else if(false){ let _unused =
    WM.sun.today.filter(tv=>!isHiddenLabel(tv.d)).map(t=>{ const di=WM.sun.today.indexOf(t);
      const fid={AI:'ai',World:'world',Beauty:'beauty',Gaming:'gaming',Model:'career'}[t.d];
      const col=fid? getC((fld(fid)||{}).c||''):'var(--gold)';
      return `<div class="lbl" style="margin-top:26px; color:${t.d==='Model'?'var(--gold)':col};">${t.d} — <span style="letter-spacing:.1em;">updated ${t.fresh}</span></div>` +
        (t.cards||[]).map((cd,ci)=>cardHTML(di,ci,cd)).join('') +
        `<div style="margin:2px 0 6px;"><span class="cx" style="font-family:Cinzel,serif; font-size:8.5px; letter-spacing:.12em; text-transform:uppercase; padding:3px 10px; border:1px solid var(--gold-4); border-radius:12px; color:var(--dim); cursor:pointer;" onclick="goPage('${t.page}')">❖ the full ${t.d.toLowerCase()} brief</span></div>`;
    }).join(''); }
  else if(sel.startsWith('day:')){ const di=+sel.slice(4); const t=WM.sun.today[di];
    crumb=`Atlas › <span class="xlink" onclick="go('today')">what changed today</span> › <b>${t.d}</b>`;
    h = `<h2 style="font-size:24px;">${t.d} — what changed</h2><div class="ep">updated ${t.fresh} <i class="fresh" style="margin-left:6px;">● fresh</i></div>` +
      (t.cards||[]).map((cd,ci)=>cardHTML(di,ci,cd)).join('') +
      `<div style="margin-top:6px;">${pageLink('Read the full brief', t.page)}</div>`; }
  else if(sel.startsWith('take:')){ const T=TAKES[sel.slice(5)];
    crumb=`Atlas › <span class="xlink" onclick="go('today')">what changed today</span> › <b>expert analysis</b>`;
    const org = takeOrigin && WM.sun.today[takeOrigin.di] ? WM.sun.today[takeOrigin.di].cards[takeOrigin.ci] : null;
    h = `<div class="backbig" onclick="backToCard()">‹ back to the card<span>${org? org.h : 'what changed today'}</span></div>
    <h2 style="font-size:23px;">${T.who}</h2><div class="ep">${T.d} · from the intake inbox · quotes verbatim${T.url? ` · <a href="${T.url}" target="_blank" style="color:var(--gold-2);">read the original ↗</a>`:''}</div>
    <div class="breath" style="font-size:18px;">${T.pos}</div>
    <div class="lbl">in their words</div>` + T.quotes.map(q=>`<div class="card"><div class="ct" style="font-style:italic;">${q}</div></div>`).join('') +
    `<div class="lbl">the numbers they assert</div><p>${T.nums}</p>
    <div class="lbl">their forward claim</div><p>${T.pred}</p>
    <div class="lbl">for the build</div><p>${T.pm}</p>
    <p style="margin-top:14px;"><span class="xlink" onclick="backToCard()">‹ back to the expanded card</span></p>`; }
  else if(sel==='reck'){ crumb='Atlas › <b>Forecast scoreboard</b>';
    h = `<h2>Forecast Scoreboard</h2><div class="ep">real accuracy scores · first forecasts resolved June 9 · lower Brier = sharper</div>
    <table class="led"><tr><th>Mind</th><th>n</th><th>Hits</th><th>Brier</th><th></th></tr>` +
    WM.reckoning.rows.map(r=>`<tr><td style="color:var(--cream)">${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td><b style="color:var(--gold-2)">${r[3]}</b></td><td style="color:var(--dim); font-size:12px;">${r[4]}</td></tr>`).join('') +
    `</table><p style="font-size:13px; color:var(--dim); font-style:italic;">* practice — committed after the resolution date; voided for the ledger by the look-ahead guard. Skill is earned per lane: weights move only after ≥5 resolved per domain.</p>`; }

      h += `<div class="lbl">briefs &amp; deep dives</div>` + f.record.map((r,i)=>`<div class="card link" onclick="goPage('${r[2]}')"><div class="ch"><span>${r[0]}</span><span class="go">open ❖</span></div><div class="ct">${r[1]}</div></div>`).join('');
      h += `<br>${pageLink('The field write-up — full page','fields')}`; }
    else if(leaf[0]==='t'){ const t=f.theses[+leaf.slice(1)]; crumb=`Atlas › <span class="xlink" onclick="go('${fid}')" style="color:${c}">${f.name}</span> › <b>belief</b>`;
      h = `<h2 style="font-size:23px;">${t.t}</h2><div class="ep" style="color:${c}">working belief · ${f.name}</div><p>${t.d}</p><div class="card"><div class="ch"><span>what would change this belief</span></div><div class="ct flip" style="font-size:13.5px;">${t.flip}</div></div>`; }
    else if(leaf[0]==='f'){ const fc=f.forecasts[+leaf.slice(1)]; crumb=`The Spine › <span class="xlink" onclick="go('${fid}')" style="color:${c}">${f.name}</span> › <b>forecast</b>`;

        (fc.minds.length? `<div class="lbl">the minds</div><div class="minds">` + fc.minds.map(m=>`<span class="mind"><b>${m[0]}</b> ${m[1]}</span>`).join('') + `</div>`:'') +
        (fc.links||[]).map(l=>pageLink(l[0],l[1])).join(' '); }
    else { const r=f.record[+leaf.slice(1)]; goPage(r[2]); return; }
  }
  crumbEl.innerHTML = crumb; contentEl.innerHTML = h;

}
function drawThread(){
  const svg=document.getElementById('thread'); if(!svg) return;
  const nd=document.querySelector('#spine .node.sel')||document.querySelector('#spine .node.lv0');
  const cm=document.getElementById('crumb');
  const fl=document.querySelector('#rail .r-follow')||document.querySelector('#rail .r-h');
  if(!nd||!cm||!fl){ svg.innerHTML=''; return; }
  const a=nd.getBoundingClientRect(), b=cm.getBoundingClientRect(), c=fl.getBoundingClientRect();
  const W=window.innerWidth, H=window.innerHeight;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`); svg.setAttribute('width',W); svg.setAttribute('height',H);
  const ax=a.right-4, ay=a.top+a.height/2, bx=b.left+14, by=b.top+b.height/2, cx2=c.left-6, cy2=c.top+c.height/2;
  svg.innerHTML=`<path d="M ${ax} ${ay} C ${ax+70} ${ay}, ${bx-60} ${by}, ${bx} ${by}"/>
    <path d="M ${bx} ${by} C ${bx+(cx2-bx)*0.4} ${by}, ${cx2-80} ${cy2}, ${cx2} ${cy2}"/>
    <circle cx="${ax}" cy="${ay}" r="2.6"/><circle cx="${cx2}" cy="${cy2}" r="2.6"/>`;
  svg.querySelectorAll('path').forEach(pt=>{ try{ const L=pt.getTotalLength();
    pt.style.animation='none'; pt.style.strokeDasharray=L; pt.style.strokeDashoffset=L;
    pt.style.transition='stroke-dashoffset 1s var(--ease-expo)';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ pt.style.strokeDashoffset='0'; }));
    setTimeout(()=>{ pt.style.strokeDasharray='3 7'; pt.style.strokeDashoffset=''; pt.style.animation=''; pt.style.transition=''; }, 1150);
  }catch(e){} });
}
const _go=go; go=function(id){ _go(id); requestAnimationFrame(drawThread); };
const _goPage=goPage; goPage=function(k){ _goPage(k); requestAnimationFrame(drawThread); };
window.addEventListener('resize',()=>drawThread());
document.getElementById('spine').addEventListener('scroll',()=>drawThread(),{passive:true});
