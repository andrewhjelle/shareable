const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock(){
  const btn = document.getElementById('go'), err = document.getElementById('err');
  btn.disabled = true; btn.textContent = 'Decrypting…'; err.style.display = 'none';
  try {
    const p = JSON.parse(P);
    const keyMat = await crypto.subtle.importKey('raw', new TextEncoder().encode(document.getElementById('pw').value), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt:b64(p.salt), iterations:p.iter, hash:'SHA-256'}, keyMat, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(p.iv)}, key, b64(p.ct));
    const html = new TextDecoder().decode(pt);
    document.open(); document.write(html); document.close();
  } catch(e) {
    err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Open';
  }
}

document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
