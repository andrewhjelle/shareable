    const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt:b64(p.salt), iterations:p.iter, hash:'SHA-256'}, keyMat, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(p.iv)}, key, b64(p.ct));
    const html = new TextDecoder().decode(pt);
    document.open(); document.write(html); document.close();
  } catch(e) {
    err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Open';
  }
}
document.getElementById('go').addEventListener('click', unlock);
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
</script>
